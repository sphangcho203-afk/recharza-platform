name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: npm install --silent

      - name: Validate database schema
        run: npm run db:validate

      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload type-check failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-failure
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
